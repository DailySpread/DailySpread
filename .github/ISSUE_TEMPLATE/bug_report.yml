name: "🐛 버그 리포트 (Bug Report)"
description: "타로 웹 서비스에서 발견한 버그를 제보합니다."
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## 버그 리포트
        발견한 문제를 가능한 한 구체적으로 설명해 주세요.
        재현 단계가 명확할수록 빠르게 해결할 수 있습니다.

  - type: dropdown
    id: bug-area
    attributes:
      label: "버그 발생 영역"
      description: "문제가 발생한 영역을 선택해 주세요."
      options:
        - "🃏 카드 선택 / 뒤집기 인터랙션"
        - "🔮 스프레드 배치 / 레이아웃"
        - "📖 해석 결과 표시"
        - "💫 애니메이션 / 트랜지션"
        - "📱 반응형 / 모바일 레이아웃"
        - "👤 사용자 프로필 / 리딩 히스토리"
        - "🔗 공유 기능"
        - "🛠️ 기타"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: "심각도"
      description: "버그의 영향 범위를 선택해 주세요."
      options:
        - "치명적 - 서비스 이용 불가 또는 데이터 유실"
        - "높음 - 핵심 기능(카드 선택/해석)이 정상 동작하지 않음"
        - "중간 - 기능은 동작하나 사용성에 문제가 있음"
        - "낮음 - 사소한 표시 오류 또는 미세한 불편"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "버그 설명"
      description: "어떤 문제가 발생했는지 간결하게 설명해 주세요."
      placeholder: "예) 3장 스프레드에서 두 번째 카드를 뒤집으면 첫 번째 카드의 해석이 사라집니다."
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: "재현 단계"
      description: "버그를 재현할 수 있는 단계를 순서대로 작성해 주세요."
      placeholder: |
        1. 메인 화면에서 '3장 스프레드'를 선택한다.
        2. 첫 번째 카드를 탭하여 뒤집는다.
        3. 두 번째 카드를 탭하여 뒤집는다.
        4. 첫 번째 카드의 해석 텍스트가 빈 상태로 표시된다.
    validations:
      required: true

  - type: textarea
    id: expected-vs-actual
    attributes:
      label: "기대 동작 vs 실제 동작"
      description: "어떻게 동작해야 하는지와 실제로 어떻게 동작했는지 비교해 주세요."
      placeholder: |
        기대: 두 번째 카드를 뒤집어도 첫 번째 카드의 해석이 유지된다.
        실제: 두 번째 카드를 뒤집는 순간 첫 번째 카드의 해석이 사라진다.
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: "브라우저 / 환경"
      description: "문제가 발생한 브라우저와 OS를 알려주세요."
      placeholder: "예) Chrome 131 / macOS Sonoma, Safari / iOS 18"
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: "스크린샷 / 화면 녹화"
      description: "문제 상황을 보여주는 스크린샷이나 화면 녹화가 있다면 첨부해 주세요."
      placeholder: "이미지를 드래그 앤 드롭하거나 붙여넣기 해 주세요."
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: "제출 전 확인"
      options:
        - label: "기존 이슈에 동일한 버그 리포트가 없는지 확인했습니다."
          required: true
        - label: "최신 버전에서 재현되는 문제입니다."
          required: true
