name: "✨ 기능 요청 (Feature Request)"
description: "타로 웹 서비스에 새로운 기능을 제안합니다."
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## 기능 요청
        타로 웹 서비스에 추가하고 싶은 기능을 설명해 주세요.
        가능한 한 구체적으로 작성해 주시면 검토에 큰 도움이 됩니다.

  - type: dropdown
    id: feature-area
    attributes:
      label: "기능 영역"
      description: "요청하는 기능이 해당하는 영역을 선택해 주세요."
      options:
        - "🃏 카드 덱 / 카드 관리"
        - "🔮 스프레드 (배열 방식)"
        - "📖 해석 결과 / 리딩 로직"
        - "🎴 카드 선택 인터랙션"
        - "💫 UI / 애니메이션"
        - "👤 사용자 프로필 / 히스토리"
        - "🔗 공유 / 외부 연동"
        - "♿ 접근성 (a11y)"
        - "⚡ 성능 최적화"
        - "🛠️ 기타"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "제안 우선순위"
      description: "이 기능이 얼마나 중요하다고 생각하시나요?"
      options:
        - "높음 - 핵심 사용자 경험에 직접 영향"
        - "중간 - 있으면 좋지만 필수는 아님"
        - "낮음 - 장기적으로 고려할 개선사항"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "기능 설명"
      description: "어떤 기능을 원하시나요? 해결하고자 하는 문제나 배경도 함께 적어 주세요."
      placeholder: |
        예) 타로 리딩 결과를 이미지로 저장할 수 있는 기능이 필요합니다.
        현재는 결과 화면을 스크린샷으로만 공유할 수 있어 불편합니다.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: "기대 동작"
      description: "이 기능이 구현되면 어떻게 동작해야 하나요?"
      placeholder: |
        예)
        1. 리딩 결과 화면에 '이미지 저장' 버튼이 표시된다.
        2. 버튼을 누르면 카드 배치와 해석 텍스트가 포함된 이미지가 생성된다.
        3. 생성된 이미지를 다운로드하거나 바로 SNS에 공유할 수 있다.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "대안 방안"
      description: "고려해 본 대안이 있다면 설명해 주세요."
      placeholder: "예) 이미지 대신 링크 공유 방식도 고려해 볼 수 있습니다."
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: "추가 컨텍스트"
      description: "참고할 스크린샷, 목업, 레퍼런스 링크 등이 있다면 첨부해 주세요."
      placeholder: "스크린샷, 참고 서비스 URL, 디자인 시안 등"
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: "제출 전 확인"
      options:
        - label: "기존 이슈에 동일한 기능 요청이 없는지 확인했습니다."
          required: true
        - label: "이 요청은 버그 리포트가 아닌 새로운 기능 제안입니다."
          required: true
